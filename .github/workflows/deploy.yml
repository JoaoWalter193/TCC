name: Deploy and Run Server
on:
      push:
          branches: [ main ]
jobs:
      deploy:
        runs-on: self-hosted
        
        steps:
          - name: Checkout code
            uses: actions/checkout@v4


          - name: Deploy and Run application
            run: |
              cd ~/TCC/
              git pull origin main 
              docker compose down
              docker compsoe -d --build
