<ion-header [translucent]="true">
  <ion-toolbar>
    @if (auth.isLoggedIn()) {
    <ion-button slot="end" fill="">
      <ion-icon name="menu-outline"></ion-icon>
    </ion-button>
    } @else {
    <ion-button slot="end" (click)="navigateToLogin()">Entrar</ion-button>
    }
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  @if (auth.isLoggedIn()) {

  } @else {
  <ion-col>
    <ion-icon name="hand-left-outline" size="large"></ion-icon>
    <p>Conecte-se</p>
    <p>para se manter informado!</p>
    <a (click)="navigateToLogin()">Quero me manter informado</a>
  </ion-col>
  }
</ion-content>
