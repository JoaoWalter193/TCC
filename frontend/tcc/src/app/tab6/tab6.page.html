<ion-header [translucent]="true">
  @if (auth.isLoggedIn()) {
  <ion-toolbar>
    <ion-buttons slot="start" class="header-logo-wrapper">
      <img src="assets/icon/favicon.png" class="header-logo" />
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
  } @else {
  <ion-toolbar>
    <ion-buttons slot="start" class="header-logo-wrapper">
      <img src="assets/icon/favicon.png" class="header-logo" />
    </ion-buttons>
    <ion-button class="btn-entrar" fill="solid" color="primary" mode="ios" slot="end" (click)="navigateToLogin()">Entrar</ion-button>
  </ion-toolbar>
  }

  <div class="mode-tabs">
    <button class="mode-tab" [class.active]="modoSelecionado === 'dashboard'" (click)="mudarModo('dashboard')">
      Dashboard
    </button>
    <div class="mode-divider"></div>
    <button class="mode-tab" [class.active]="modoSelecionado === 'my-dashboard'" (click)="mudarModo('my-dashboard')">
      Meus Dashboards
    </button>
  </div>
</ion-header>

<ion-content [fullscreen]="true">
  @switch (modoSelecionado) {
  @case ('dashboard') {
  <app-dashboard-view></app-dashboard-view>
  }
  @case ('my-dashboard') {
  <app-my-dashboard-view></app-my-dashboard-view>
  }
  @default {
  <app-dashboard-view></app-dashboard-view>
  }
  }
</ion-content>
