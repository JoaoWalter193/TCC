<ion-header [translucent]="true">
  <ion-toolbar>
    @if (auth.isLoggedIn()) {
    <ion-button slot="end" fill="">
      <ion-icon name="menu-outline"></ion-icon>
    </ion-button>
    } @else {
    <ion-button slot="end" (click)="navigateToLogin()">Entrar</ion-button>
    <ion-text>
      <h2>Dashboard</h2>
    </ion-text>
    }
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
</ion-content>
