<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Favoritos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  @if (auth.getUsuarioId() == null) {
    <div class="empty-state">
      <ion-text color="medium">
        <p>Faça login para favoritar proposições.</p>
      </ion-text>
    </div>
  } @else if (carregando) {
    <div class="empty-state">
      <ion-text color="medium">
        <p>Carregando...</p>
      </ion-text>
    </div>
  } @else if (favoritos.length === 0) {
    <div class="empty-state">
      <ion-text color="medium">
        <p>Nenhuma proposição favoritada ainda.</p>
      </ion-text>
    </div>
  } @else {
    <div class="favoritos-list">
      @for (item of favoritos; track trackById($index, item)) {
        <app-card
          [post]="item"
          [link]="['/proposicao', item.id]"
          [usuarioId]="usuarioId"
          (verVereador)="verVereador($event)"
        />
      }
    </div>
  }

</ion-content>
