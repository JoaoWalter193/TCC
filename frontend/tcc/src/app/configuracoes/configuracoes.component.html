<ion-header collapse="fade" class="config-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/perfil"></ion-back-button>
    </ion-buttons>

    <ion-buttons slot="end">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="config-content">

  <div class="config-topo">
    <h2>Configurações</h2>
    <p>Personalize sua experiência no aplicativo</p>
  </div>

  <div class="config-card">

    <ion-list lines="none">

      <ion-item routerLink="/tabs/tab1">
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-label>Editar Perfil</ion-label>
      </ion-item>

      <ion-item>
        <ion-icon name="moon-outline" slot="start"></ion-icon>
        <ion-label>Modo escuro</ion-label>
        <ion-toggle
          slot="end"
          [ngModel]="paletteToggle"
          (ionChange)="toggleChange($event)">
        </ion-toggle>
      </ion-item>

      <ion-item>
        <ion-icon name="notifications-outline" slot="start"></ion-icon>
        <ion-label>Notificações</ion-label>
        <ion-toggle
          slot="end"
          [ngModel]="notifyToggle"
          (ionChange)="toggleNotify($event)">
        </ion-toggle>
      </ion-item>

    </ion-list>

  </div>

  <div class="logout-area">
    <ion-button mode="ios" fill="clear" color="danger">
      <ion-icon name="log-out-outline" slot="start"></ion-icon>
      Sair
    </ion-button>
  </div>

</ion-content>
