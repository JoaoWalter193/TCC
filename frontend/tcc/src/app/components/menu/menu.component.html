<ion-menu contentId="main-content" side="end" class="custom-menu">

  <ion-header>
    <ion-toolbar>
      <ion-title>Menu</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content>

    <div class="menu-section">

      <ion-list lines="none">

        <ion-menu-toggle auto-hide="true">
          <ion-item routerLink="/perfil">
            <ion-icon name="person-outline" slot="start"></ion-icon>
            <ion-label>Perfil</ion-label>
          </ion-item>
        </ion-menu-toggle>

        <ion-menu-toggle auto-hide="true">
          <ion-item routerLink="/historico">
            <ion-icon name="time-outline" slot="start"></ion-icon>
            <ion-label>Histórico</ion-label>
          </ion-item>
        </ion-menu-toggle>

        <ion-menu-toggle auto-hide="true">
          <ion-item (click)="navMeusDashboards()">
            <ion-icon name="bar-chart-outline" slot="start"></ion-icon>
            <ion-label>Meus Dashboards</ion-label>
          </ion-item>
        </ion-menu-toggle>

        <ion-menu-toggle auto-hide="true">
          <ion-item routerLink="/configuracoes">
            <ion-icon name="settings-outline" slot="start"></ion-icon>
            <ion-label>Configurações</ion-label>
          </ion-item>
        </ion-menu-toggle>

      </ion-list>

    </div>

  </ion-content>

</ion-menu>
