<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
    Histórico
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @if (carregando) {
    <p>Carregando...</p>
  } @else if (historico.length === 0) {
    <div class="empty-state">
      <ion-icon name="time-outline" class="empty-icon"></ion-icon>
      <ion-text>
        <p>Nenhum item visitado ainda.</p>
      </ion-text>
    </div>
  } @else {
    @for (item of historico; track item.id + '-' + item.tipo) {
      @if (item.tipo === 'PROPOSICAO') {
        <app-card
          [post]="item.componente"
          [usuarioId]="usuarioId"
          [link]="['/proposicao', item.componente.id]">
        </app-card>
      } @else if (item.tipo === 'VEREADOR') {
        <app-card-vereador
          [post]="item.componente"
          [link]="['/vereador', item.componente.id, item.componente.nome]">
        </app-card-vereador>
      }
    }
  }
</ion-content>
