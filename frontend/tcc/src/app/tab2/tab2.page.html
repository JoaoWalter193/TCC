<ion-header [translucent]="true">
  <ion-toolbar>
    @if (auth.isLoggedIn()) {
    <ion-button slot="end" fill="">
      <ion-icon name="menu-outline"></ion-icon>
    </ion-button>
    } @else {
    <ion-button slot="end" (click)="navigateToLogin()">Entrar</ion-button>
    }
  </ion-toolbar>
  <ion-grid>

  </ion-grid>
</ion-header>

<ion-content [fullscreen]="true">
  @for (post of posts; track post.id) {
  <app-card [post]="post"></app-card>
  }
</ion-content>
