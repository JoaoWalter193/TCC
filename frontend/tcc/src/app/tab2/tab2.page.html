<ion-header [translucent]="true">
  <ion-toolbar>
    @if (auth.isLoggedIn()) {
    <ion-buttons slot="end">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    } @else {
    <ion-button slot="end" (click)="navigateToLogin()">Entrar</ion-button>
    }
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  @for (post of posts; track post.id) {
  <app-card [post]="post" [link]="['/proposicao', post.id]"></app-card>
  }
</ion-content>
