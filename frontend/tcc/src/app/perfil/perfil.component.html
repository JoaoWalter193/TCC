<ion-header collapse="fade" class="perfil-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab2"></ion-back-button>
    </ion-buttons>

    <ion-buttons slot="end">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="perfil-content">

  <div class="perfil-topo">
    <div class="avatar">
      <ion-icon name="person-outline"></ion-icon>
    </div>

    <h2>Nome</h2>
    <p>email@exemplo.com</p>
  </div>

  <div class="perfil-info-card">

    <div class="info-item">
      <strong>Favoritos</strong>
      <p>12</p>
    </div>

    <div class="info-divider"></div>

    <div class="info-item">
      <strong>Seguindo</strong>
      <p>8</p>
    </div>

  </div>

  <div class="perfil-opcoes">

    <ion-list lines="none">

      <ion-item routerLink="/historico">
        <ion-icon name="time-outline" slot="start"></ion-icon>
        <ion-label>Histórico</ion-label>
      </ion-item>

      <ion-item (click)="navMeusDashboards()">
        <ion-icon name="bar-chart-outline" slot="start"></ion-icon>
        <ion-label>Meus Dashboards</ion-label>
      </ion-item>

      <ion-item routerLink="/configuracoes">
        <ion-icon name="settings-outline" slot="start"></ion-icon>
        <ion-label>Configurações</ion-label>
      </ion-item>

    </ion-list>

  </div>

</ion-content>
